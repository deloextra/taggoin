<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NFC Coins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#322d4d;
    --purple-deep:#241f39;
    --purple-light:#4c4472;
    --pink:#da739e;
    --pink-dark:#c2597f;
    --pink-soft:#e6a0bf;
    --green:#34C759;
    --red:#FF3B30;
    --gray:#8E8E93;
    --text:#F4F0F8;
    --text-secondary:rgba(244,240,248,0.62);
    --separator:rgba(255,255,255,0.14);
    --glass-fill:rgba(255,255,255,0.07);
    --glass-fill-strong:rgba(255,255,255,0.13);
    --glass-border:rgba(255,255,255,0.18);
  }
  @font-face{
    font-family: 'SpaceAge';
    src: url('fonts/SpaceAge.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  .brand-title{
    font-family:'SpaceAge', -apple-system, sans-serif;
    font-size:30px; text-align:center; letter-spacing:2px;
    margin:0 0 20px; font-weight:400;
    background:linear-gradient(135deg, var(--pink), var(--purple-light));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 10%, rgba(218,115,158,0.30), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(76,68,114,0.55), transparent 45%),
      radial-gradient(circle at 20% 90%, rgba(218,115,158,0.16), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(76,68,114,0.40), transparent 45%),
      linear-gradient(180deg, var(--purple), var(--purple-deep));
    background-repeat:no-repeat;
    background-size:100% 100%;
  }
  #scrollContainer{
    position:absolute; inset:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
    display:flex; justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{width:100%; max-width:480px; position:relative;}

  .card{
    background:var(--glass-fill);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:30px; padding:30px 26px;
    box-shadow:0 8px 32px rgba(31,38,135,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    margin-bottom:16px;
  }
  input[type=text], input[type=password], input[type=number], input[type=datetime-local]{
    width:100%; padding:16px 18px; border-radius:16px; border:1px solid var(--separator);
    background:rgba(255,255,255,0.06); backdrop-filter:blur(8px);
    font-size:17px; color:var(--text); outline:none;
    font-family:inherit; margin-bottom:12px;
  }
  input:focus{border-color:var(--pink); background:rgba(255,255,255,0.10);}
  .field-label{
    font-size:14px; color:var(--text-secondary); font-weight:600;
    margin:0 0 6px 4px; display:block;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:none; border-radius:100px; padding:16px 26px; font-size:17.5px;
    font-weight:600; cursor:pointer; width:100%; font-family:inherit;
    min-height:50px;
    transition:transform .12s, opacity .12s;
    backdrop-filter:blur(12px) saturate(160%);
    -webkit-backdrop-filter:blur(12px) saturate(160%);
  }
  .btn:active{transform:scale(0.97); opacity:.85;}
  .btn-compact{width:auto; padding:15px 32px;}
  .btn-primary{
    background:linear-gradient(180deg, var(--pink-soft), var(--pink-dark));
    color:#fff; box-shadow:0 4px 14px rgba(218,115,158,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-secondary{
    background:rgba(255,255,255,0.08); color:var(--pink-soft);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .btn-danger{
    background:rgba(255,59,48,0.15); color:var(--red);
    border:1px solid rgba(255,59,48,0.25);
  }
  .btn-small{width:auto; padding:14px 20px; font-size:15.5px; border-radius:100px; min-height:46px;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
  .btn-row .btn-small{flex:1; min-width:110px;}

  .back-btn{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--glass-border);
    background:var(--glass-fill-strong); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    margin-bottom:18px; box-shadow:0 4px 14px rgba(31,38,135,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
    color:var(--pink-soft); transition:transform .12s;
  }
  .back-btn:active{transform:scale(0.9);}
  .back-btn svg{width:20px; height:20px;}

  .coin-status{text-align:center; padding:28px 0;}
  .icon-circle{
    width:116px; height:116px; border-radius:50%; margin:0 auto 24px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
  }
  .icon-circle svg{width:52px; height:52px;}
  .icon-circle.result-icon{position:relative; overflow:hidden;}
  .result-check{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:1;
    animation: resultCheckFade .6s ease 1.15s forwards;
  }
  .result-coin-static{
    position:absolute; top:50%; left:50%; width:118%; height:118%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:drop-shadow(0 3px 8px rgba(230,160,20,0.35));
    opacity:0;
    animation: resultCoinFadeIn .6s ease 1.15s forwards;
  }
  @keyframes resultCheckFade{
    0%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(0.85); }
  }
  @keyframes resultCoinFadeIn{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.85); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .status-title{font-size:28px; font-weight:700; margin:0 0 8px; letter-spacing:-0.4px;}
  .status-title-futuristic{
    font-family:'SpaceAge', 'Orbitron', -apple-system, sans-serif;
    font-weight:700; letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(135deg, #baffc9, var(--green));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 18px rgba(52,199,89,0.35);
  }
  .card-enter{
    animation: cardEnterAnim .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardEnterAnim{
    0%{ opacity:0; transform:translateY(10px) scale(0.98); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .status-sub{font-size:15px; color:var(--text-secondary); margin:0 0 22px;}
  .date-block{
    background:rgba(255,255,255,0.06); border:1px solid var(--glass-border);
    border-radius:18px; padding:14px 18px; margin:18px 8px 14px; text-align:left;
  }
  .date-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 0; font-size:13.5px;}
  .date-row + .date-row{border-top:1px solid var(--separator);}
  .date-row span{color:var(--text-secondary);}
  .date-row strong{font-weight:600; text-align:right; font-size:13.5px;}
  .note-text{
    font-size:12px; color:var(--text-secondary); margin:0 0 4px; line-height:1.5;
  }
  .section-divider{
    height:1px; background:var(--separator); margin:22px 0 20px; border:none;
  }
  .coin-id{
    font-size:13px; color:var(--text-secondary); margin-top:18px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    background:rgba(255,255,255,0.07); display:inline-block; padding:8px 16px; border-radius:100px;
    border:1px solid var(--glass-border);
  }

  /* ---------- coriandoli ---------- */
  .confetti-piece{
    position:fixed; border-radius:2px; pointer-events:none;
  }

  /* ---------- animazione moneta -> spunta (schermo intero) ---------- */
  .coin-reveal{
    position:fixed; inset:0; z-index:80;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px;
  }
  .coin-reveal-stage{
    position:relative; width:116px; height:116px;
    margin:0 auto 26px;
    overflow:visible;
  }
  .coin-reveal-img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 10px 34px rgba(230,160,20,0.5));
    animation: coinGrowFade 1.9s ease both;
    z-index:2;
  }
  .coin-reveal-check{
    position:absolute; top:50%; left:50%; width:116px; height:116px;
    transform:translate(-50%,-50%) scale(0.5); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(52,199,89,0.15); color:var(--green);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
    opacity:0;
    animation: checkPopIn .45s cubic-bezier(.34,1.56,.64,1) 1.65s forwards;
  }
  .coin-reveal-check svg{width:52px; height:52px;}
  @keyframes coinGrowFade{
    0%{ opacity:0; transform:scale(0.5); }
    22%{ opacity:1; transform:scale(1); }
    75%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(1); }
  }
  @keyframes checkPopIn{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .coin-reveal.reveal-exit{
    animation: revealExit .4s ease both;
  }
  @keyframes revealExit{
    0%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(0.97); }
  }

  .badge{display:inline-block; padding:7px 15px; border-radius:100px; font-size:14px; font-weight:700;}
  .duration-row{
    display:flex; align-items:center; gap:10px;
    margin:0 0 16px;
  }
  .duration-row-text{font-size:14.5px; color:var(--text-secondary);}
  .duration-row-text strong{color:var(--text); font-weight:700;}
  .icon-btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:38px; height:38px; flex-shrink:0; padding:0;
    background:rgba(255,255,255,0.10); border:1px solid var(--glass-border);
    border-radius:50%; cursor:pointer;
    color:var(--pink-soft); -webkit-tap-highlight-color:transparent;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);
    transition:transform .12s, opacity .12s;
  }
  .icon-btn:active{transform:scale(0.90); opacity:.8;}
  .icon-btn svg{width:19px; height:19px;}
  .badge-green{background:rgba(52,199,89,0.15); color:var(--green);}
  .badge-red{background:rgba(255,59,48,0.15); color:var(--red);}
  .badge-gray{background:rgba(255,255,255,0.10); color:var(--text-secondary);}
  .badge-amber{background:rgba(255,149,0,0.15); color:#ff9f0a;}

  /* ---------- dashboard statistiche ---------- */
  .stats-grid{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px;
  }
  .stat-tile{
    background:var(--glass-fill); border:1px solid var(--glass-border);
    border-radius:20px; padding:18px 10px; text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
  }
  .stat-tile .stat-number{font-size:30px; font-weight:700; color:var(--text); line-height:1.1;}
  .stat-tile .stat-label{font-size:11.5px; color:var(--text-secondary); margin-top:6px; line-height:1.3;}

  h1{font-size:30px; margin:0 0 4px; letter-spacing:-0.5px;}
  .admin-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
  .coin-row{
    background:var(--glass-fill); backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:24px; padding:20px; margin-bottom:14px;
    box-shadow:0 4px 16px rgba(31,38,135,0.08);
    transform:translateZ(0);
    will-change:transform;
  }
  .coin-row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .coin-row-id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:18px; font-weight:700;}
  .coin-row-label{font-size:15px; color:var(--text-secondary); margin-top:3px;}
  .coin-row-meta{font-size:15px; color:var(--text-secondary); margin-top:12px; line-height:1.8;}
  .hidden{display:none !important;}
  .loading{text-align:center; color:var(--text-secondary); padding:40px 0; font-size:14px;}
  .error-text{color:var(--red); font-size:13px; margin-top:6px;}
  .inline-panel{margin-top:12px; padding-top:12px; border-top:1px solid var(--separator);}
  .top-actions{display:flex; gap:8px; margin-bottom:16px;}
  .top-actions .btn{width:auto; flex:1;}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,17,32,0.55); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-box{
    background:rgba(50,45,77,0.92); backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:24px; padding:26px; width:100%; max-width:340px; text-align:center;
    box-shadow:0 16px 48px rgba(0,0,0,0.45);
  }
  .modal-box p{font-size:16px; color:var(--text); line-height:1.5; margin:8px 0 22px; font-weight:500;}
  .qr-wrap{
    width:200px; height:200px; margin:0 auto 16px;
    background:#fff; border-radius:16px; padding:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.25);
  }
  .qr-wrap svg{width:100%; height:100%; display:block;}
  .notice{
    background:rgba(218,115,158,0.12); color:var(--pink-soft); font-size:12px; padding:10px 14px;
    border-radius:14px; margin-bottom:16px; text-align:center;
    border:1px solid rgba(218,115,158,0.25);
  }

  /* ---------- layout desktop: schede monete a griglia ---------- */
  @media (min-width: 820px){
    .wrap{max-width:960px;}
    .wrap > .admin-header, .wrap > .card, .wrap > .top-actions{
      max-width:480px; margin-left:auto; margin-right:auto;
    }
    #coinList{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
      gap:16px;
      align-items:start;
    }
    #coinList .coin-row{margin-bottom:0;}
    #coinList .coin-list-empty{
      grid-column:1 / -1;
      font-size:17px;
    }
  }
  #coinList .coin-list-empty{text-align:center; font-size:15px;}

  /* ---------- segmented control ---------- */
  .segmented{
    display:flex; background:rgba(255,255,255,0.06); border-radius:14px;
    padding:4px; gap:4px; margin-bottom:18px;
  }
  .segmented button{
    flex:1; padding:11px 6px; border:none; border-radius:11px; background:transparent;
    color:var(--text-secondary); font-weight:600; font-size:14.5px; cursor:pointer;
    font-family:inherit; transition:background .15s, color .15s;
  }
  .segmented button.active{
    background:linear-gradient(180deg, var(--pink-soft), var(--pink-dark)); color:#fff;
  }

  /* ---------- drum picker ---------- */
  .drum-wrapper{ position:relative; height:154px; margin-bottom:20px; }
  .drum{
    height:154px; overflow-y:scroll; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch; padding:55px 0;
    scrollbar-width:none;
  }
  .drum::-webkit-scrollbar{ display:none; }
  .drum-item{
    height:44px; display:flex; align-items:center; justify-content:center;
    scroll-snap-align:center; font-size:19px; color:var(--text-secondary);
    font-variant-numeric:tabular-nums;
  }
  .drum-item.selected{ color:var(--text); font-weight:700; font-size:25px; }
  .drum-highlight{
    position:absolute; top:55px; left:0; right:0; height:44px;
    border-top:1px solid var(--glass-border); border-bottom:1px solid var(--glass-border);
    background:rgba(255,255,255,0.05); border-radius:12px; pointer-events:none;
  }
</style>
</head>
<body>
<div id="scrollContainer">
  <div class="wrap" id="app">
    <div class="loading">Caricamento…</div>
  </div>
</div>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {

              bytes.push(b & 0xff);

          }
        }
      }

// Il Data API URL include già "/rest/v1" in fondo: le chiamate alle tabelle
// si costruiscono aggiungendo solo il nome tabella, es. `${NEON_DATA_API_URL}/nfc_coins`
const NEON_DATA_API_URL = "https://ep-silent-cloud-at5smaxh.apirest.c-9.us-east-1.aws.neon.tech/neondb/rest/v1";
const NEON_AUTH_URL = "https://ep-silent-cloud-at5smaxh.neonauth.c-9.us-east-1.aws.neon.tech/neondb/auth";

// Wrapper attorno a fetch con timeout: se il server non risponde entro il
// tempo limite, la richiesta viene interrotta e lancia un errore invece di
// restare bloccata per sempre (evita schermate "Verifica in corso…" fisse).
async function fetchWithTimeout(url, options = {}, timeoutMs = 12000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try{
    return await fetch(url, { ...options, signal: controller.signal });
  }catch(e){
    if(e.name === "AbortError"){
      throw new Error("Timeout: il server non risponde.");
    }
    throw e;
  }finally{
    clearTimeout(timer);
  }
}

const COIN_IMG = "images/coin.png";

// Identificativo del dispositivo, persistente su localStorage (non sessionStorage:
// deve sopravvivere alla chiusura del browser). Serve a legare una VirtualCoin
// al primo dispositivo che la attiva, per evitare che il link venga condiviso
// e mostri "Attiva" anche su telefoni diversi da quello del possessore.
// Se localStorage non è disponibile (Safari privato, alcune webview molto
// restrittive), si usa un ID temporaneo solo in memoria: l'aggancio dispositivo
// in quel caso non sopravvive alla chiusura del browser, ma l'app resta comunque
// utilizzabile invece di bloccarsi con un errore.
let _memoryDeviceId = null;
function getDeviceId(){
  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));
  try{
    let id = localStorage.getItem("vc_device_id");
    if(!id){
      id = newId();
      localStorage.setItem("vc_device_id", id);
    }
    return id;
  }catch(e){
    if(!_memoryDeviceId) _memoryDeviceId = newId();
    return _memoryDeviceId;
  }
}

function getAccessToken(){ return sessionStorage.getItem("vc_access_token"); }
function isLoggedIn(){ return !!getAccessToken(); }

async function authHeaders(){
  const headers = {
    "Content-Type": "application/json"
  };
  const token = await getValidAccessToken();
  if(token){
    headers["Authorization"] = "Bearer " + token;
  }
  return headers;
}

// Chiede un JWT fresco a Neon Auth usando il token di sessione (più duraturo,
// ottenuto al login) e lo legge dall'header di risposta "set-auth-jwt" —
// il JWT NON arriva nel corpo della risposta ma in questo header.
async function fetchFreshJwt(sessionToken){
  const res = await fetchWithTimeout(`${NEON_AUTH_URL}/get-session`, {
    method: "GET",
    headers: { "Authorization": "Bearer " + sessionToken },
    cache: "no-store"
  });
  if(!res.ok) return null;
  return res.headers.get("set-auth-jwt");
}

function saveAccessToken(jwt){
  sessionStorage.setItem("vc_access_token", jwt);
  // I JWT di Neon Auth durano 15 minuti (900s): salvo quando scadrà per
  // sapere quando è il momento di rinnovarlo.
  sessionStorage.setItem("vc_access_token_expires_at", String(Date.now() + 15 * 60 * 1000));
}

// Restituisce un JWT valido, rinnovandolo in automatico se è scaduto o sta
// per scadere, così una sessione admin più lunga di 15 minuti non si blocca
// a metà lavoro.
async function getValidAccessToken(){
  const token = sessionStorage.getItem("vc_access_token");
  if(!token) return null; // non loggato

  const expiresAt = parseInt(sessionStorage.getItem("vc_access_token_expires_at") || "0", 10);
  if(Date.now() < expiresAt - 60000){
    return token; // ancora valido con un margine di sicurezza di 60s
  }

  const sessionToken = sessionStorage.getItem("vc_session_token");
  if(!sessionToken) return token;

  try{
    const freshJwt = await fetchFreshJwt(sessionToken);
    if(freshJwt){
      saveAccessToken(freshJwt);
      return freshJwt;
    }
  }catch(e){ /* se il rinnovo fallisce, si tenta comunque con il token esistente */ }

  return token;
}

async function login(email, password){
  // Passo 1: crea la sessione con email+password. La risposta contiene un
  // token di sessione "opaco" (non un JWT), usato solo per il passo 2.
  const signInRes = await fetchWithTimeout(`${NEON_AUTH_URL}/sign-in/email`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, rememberMe: true }),
    cache: "no-store"
  });
  const signInData = await signInRes.json();
  if(!signInRes.ok) throw new Error(signInData.message || signInData.error || "Credenziali non valide");

  const sessionToken = signInData.token;
  if(!sessionToken) throw new Error("Login riuscito ma token di sessione non trovato nella risposta.");

  // Passo 2: scambia il token di sessione con il vero JWT da usare per il Data API.
  const jwt = await fetchFreshJwt(sessionToken);
  if(!jwt) throw new Error("Login riuscito ma non è stato possibile ottenere il token di accesso (JWT).");

  sessionStorage.setItem("vc_session_token", sessionToken);
  saveAccessToken(jwt);
}

function logout(){
  sessionStorage.removeItem("vc_access_token");
  sessionStorage.removeItem("vc_access_token_expires_at");
  sessionStorage.removeItem("vc_session_token");
  goHome();
}

const CODE_CHARSET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // esclude 0/O/1/I per evitare ambiguità
const CODE_LENGTH = 10;

function computeChecksum(body){
  let sum = 0;
  for(let i = 0; i < body.length; i++){
    sum += CODE_CHARSET.indexOf(body[i]) * (i + 7);
  }
  return CODE_CHARSET[sum % CODE_CHARSET.length];
}

function generateCoinId(){
  let body = "";
  for(let i = 0; i < CODE_LENGTH - 1; i++){
    body += CODE_CHARSET[Math.floor(Math.random() * CODE_CHARSET.length)];
  }
  return body + computeChecksum(body);
}

function isValidCoinFormat(id){
  if(typeof id !== "string" || id.length !== CODE_LENGTH) return false;
  const upper = id.toUpperCase();
  for(const ch of upper){
    if(!CODE_CHARSET.includes(ch)) return false;
  }
  const body = upper.slice(0, CODE_LENGTH - 1);
  const checksum = upper.slice(CODE_LENGTH - 1);
  return computeChecksum(body) === checksum;
}

function buildCoinUrl(code){

// Genera un QR code come stringa SVG, usando la libreria qrcode-generator

function generateQrSvg(text){
  const qr = qrcode(0, "M"); // 0 = dimensione automatica, M = correzione errori media
  qr.addData(text);
  qr.make();
  return qr.createSvgTag({ scalable: true, cellSize: 4, margin: 4 });
}

function launchConfetti(){
  const colors = ["#007AFF","#34C759","#FF9500","#FF3B30","#AF52DE","#FFD60A","#5AC8FA"];
  const container = document.createElement("div");
  container.style.position = "fixed";
  container.style.inset = "0";
  container.style.pointerEvents = "none";
  container.style.zIndex = "9999";
  document.body.appendChild(container);

  const count = 80;
  let maxTotalTime = 0;

  for(let i = 0; i < count; i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    const size = 6 + Math.random() * 7;
    piece.style.width = size + "px";
    piece.style.height = (size * 1.6) + "px";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (Math.random() * 100) + "vw";
    piece.style.top = "-20px";
    container.appendChild(piece);

    // Caduta naturale: leggero ondeggiamento laterale invece di un tragitto rettilineo,
    // come farebbe un vero coriandolo cadendo nell'aria.
    const fallDistance = window.innerHeight + 60;
    const swayAmount = 30 + Math.random() * 50;
    const swayDirection = Math.random() < 0.5 ? 1 : -1;
    const rotation = (Math.random() < 0.5 ? 1 : -1) * (280 + Math.random() * 400);
    const duration = 3200 + Math.random() * 2200;
    const delay = Math.random() * 900;

    piece.animate([
      { transform: "translate(0px, 0px) rotate(0deg)", opacity: 1, offset: 0 },
      { transform: `translate(${swayDirection * swayAmount}px, ${fallDistance * 0.35}px) rotate(${rotation * 0.3}deg)`, opacity: 1, offset: 0.35 },
      { transform: `translate(${-swayDirection * swayAmount * 0.6}px, ${fallDistance * 0.7}px) rotate(${rotation * 0.7}deg)`, opacity: 1, offset: 0.7 },
      { transform: `translate(${swayDirection * swayAmount * 0.3}px, ${fallDistance}px) rotate(${rotation}deg)`, opacity: 0, offset: 1 }
    ], {
      duration,
      delay,
      easing: "ease-in",
      fill: "forwards"
    });

    maxTotalTime = Math.max(maxTotalTime, duration + delay);
  }

  setTimeout(() => container.remove(), maxTotalTime + 200);
}

async function renderCoinView(coinId){
  // Ripulisce subito la barra indirizzi: il codice serve solo un istante
  // per identificare la moneta, poi spariscono dall'URL visibile.
  if(window.history && window.history.replaceState){
    window.history.replaceState(null, "", window.location.pathname);
  }

  if(!isValidCoinFormat(coinId)){
    app.innerHTML = `<div class="card coin-status">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">VirtualCoin non riconosciuta</p>
      <p class="status-sub">Formato ID non valido.</p>
      <div class="coin-id">${coinId}</div>
    </div>`;
    return;
  }

  app.innerHTML = `<div class="loading">Verifica in corso…</div>`;

  let coin;
  try{
    coin = await sbSelectCoin(coinId);
  }catch(e){
    app.innerHTML = `<div class="card coin-status">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">Errore di connessione</p>
      <p class="status-sub">Impossibile contattare il server. Riprova.</p>
    </div>`;
    return;
  }

  let isFirstActivation = false;

  if(!coin){
    try{
      const inserted = await sbInsertCoin(coinId, { device_id: getDeviceId() });
      // Fallback: se la policy RLS non permette di rileggere la riga appena
      // creata, Supabase risponde comunque "OK" ma senza dati. In quel caso
      // continuiamo con un oggetto locale coerente con quanto appena scritto,
      // invece di lasciare "coin" undefined e mandare in crash il resto.
      coin = inserted || { id: coinId, device_id: getDeviceId(), first_scan_at: null, expires_at: null, session_code: null };
      isFirstActivation = true;
    }catch(e){
      coin = await sbSelectCoin(coinId).catch(() => null);
      if(!coin){
        app.innerHTML = `<div class="card coin-status">
          <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
          <p class="status-title">Errore</p>
          <p class="status-sub">Non è stato possibile registrare questa VirtualCoin.</p>
        </div>`;
        return;
      }
    }
  }else if(!coin.first_scan_at){
    try{
      const nowIso = new Date().toISOString();
      const myDeviceId = getDeviceId();
      const updated = await sbUpdateCoin(coinId, { first_scan_at: nowIso, device_id: myDeviceId });
      coin = updated || { ...coin, first_scan_at: nowIso, device_id: myDeviceId };
      isFirstActivation = true;
    }catch(e){
      app.innerHTML = `<div class="card coin-status">
        <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
        <p class="status-title">Errore</p>
        <p class="status-sub">Non è stato possibile attivare questa VirtualCoin.</p>
      </div>`;
      return;
    }
  }

  // Moneta già attivata in precedenza: verifica che sia lo stesso dispositivo
  // che l'ha attivata la prima volta, per evitare che il link condiviso mostri
  // "Attiva" anche su telefoni diversi da quello del possessore originale.
  if(!isFirstActivation){
    const myDeviceId = getDeviceId();
    if(!coin.device_id){
      // Moneta senza dispositivo agganciato (creata prima di questa funzione,
      // oppure sbloccata dallo staff dal pannello admin): la lega a questo dispositivo,
      // ma solo se nessun altro telefono l'ha già fatto nel frattempo (scrittura atomica).
      try{
        const updated = await sbUpdateCoinIfDeviceNull(coinId, { device_id: myDeviceId });
        if(updated){
          coin = updated;
        }else{
          // Nessuna riga tornata indietro: o un altro dispositivo ha vinto la
          // corsa nel frattempo, oppure (più spesso) la scrittura è andata a
          // buon fine ma la policy RLS blocca la rilettura per l'anonimo.
          // Verifichiamo lo stato reale con una lettura pulita prima di bloccare.
          const recheck = await sbSelectCoin(coinId).catch(() => null);
          if(recheck && recheck.device_id && recheck.device_id !== myDeviceId){
            app.innerHTML = `<div class="card coin-status">
              <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
              <p class="status-title">Dispositivo non riconosciuto</p>
              <p class="status-sub">Questa VirtualCoin risulta già collegata a un altro dispositivo.</p>
            </div>`;
            return;
          }
          coin = recheck || { ...coin, device_id: myDeviceId };
        }
      }catch(e){ /* errore di rete: si procede comunque mostrando la scheda con i dati che abbiamo */ }
    }else if(coin.device_id !== myDeviceId){
      app.innerHTML = `<div class="card coin-status">
        <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
        <p class="status-title">Dispositivo non riconosciuto</p>
        <p class="status-sub">Questa VirtualCoin risulta già collegata a un altro dispositivo.</p>
      </div>`;
      return;
    }
  }

  drawCoinStatus(coin, isFirstActivation);
}

/* ============================================================
   DURATA DI DEFAULT — display + drum picker
   ============================================================ */
let currentDefaultValue = 60;
let currentDefaultUnit = "days"; // 'days' | 'weeks' | 'months'

const UNIT_LABELS = {
  days:   { singular: "giorno",    plural: "giorni" },
  weeks:  { singular: "settimana", plural: "settimane" },
  months: { singular: "mese",      plural: "mesi" }
};

const SEGMENT_TO_PGUNIT = { giorni: "days", settimane: "weeks", mesi: "months" };
const PGUNIT_TO_SEGMENT = { days: "giorni", weeks: "settimane", months: "mesi" };

function formatDurationDisplay(value, unit){
  if(unit === "months" && value % 12 === 0){
    const years = value / 12;
    return `${years} ${years === 1 ? "anno" : "anni"}`;
  }
  const l = UNIT_LABELS[unit] || UNIT_LABELS.days;
  return `${value} ${value === 1 ? l.singular : l.plural}`;
}

async function loadDefaultDuration(){
  const display = document.getElementById("currentDurationDisplay");
  try{
    const value = await sbGetSetting("default_duration_value");
    const unit = await sbGetSetting("default_duration_unit");
    currentDefaultValue = parseInt(value, 10) || 60;
    currentDefaultUnit = unit || "days";
    display.textContent = formatDurationDisplay(currentDefaultValue, currentDefaultUnit);
  }catch(e){
    display.textContent = "Errore caricamento";
  }
}

const DURATION_UNITS = {
  giorni:    { label: "Giorni",    max: 31 },
  settimane: { label: "Settimane", max: 52 },
  mesi:      { label: "Mesi",      max: 12 }
};

function openDurationPicker(currentValue, currentUnitPg){
  let selectedUnit = PGUNIT_TO_SEGMENT[currentUnitPg] || "giorni";
  let selectedValue = Math.min(Math.max(currentValue, 1), DURATION_UNITS[selectedUnit].max);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 18px">Cambia durata</p>
      <div class="segmented" id="unitSegmented">
        <button data-unit="giorni">Giorni</button>
        <button data-unit="settimane">Settimane</button>
        <button data-unit="mesi">Mesi</button>
      </div>
      <div class="drum-wrapper">
        <div class="drum-highlight"></div>
        <div class="drum" id="valueDrum"></div>
      </div>
      <p class="status-sub" id="durationPreview" style="margin-bottom:18px"></p>
      <button class="btn btn-primary" id="confirmDurationBtn">Salva durata</button>
      <button class="btn btn-secondary" id="cancelDurationBtn" style="margin-top:10px">Annulla</button>
    </div>`;
  document.body.appendChild(overlay);

  const drumEl = document.getElementById("valueDrum");
  const previewEl = document.getElementById("durationPreview");
  const segmentedEl = document.getElementById("unitSegmented");

  function updatePreview(){
    const pgUnit = SEGMENT_TO_PGUNIT[selectedUnit];
    previewEl.textContent = `Durata selezionata: ${formatDurationDisplay(selectedValue, pgUnit)}`;
  }

  function highlightSelectedItem(value){
    drumEl.querySelectorAll(".drum-item").forEach(el => {
      el.classList.toggle("selected", parseInt(el.dataset.value, 10) === value);
    });
  }

  function buildDrum(unit, initial){
    const max = DURATION_UNITS[unit].max;
    let html = "";
    for(let i = 1; i <= max; i++){
      html += `<div class="drum-item" data-value="${i}">${i}</div>`;
    }
    drumEl.innerHTML = html;

    const itemHeight = 44;
    const idx = Math.min(Math.max(initial, 1), max) - 1;
    drumEl.scrollTop = idx * itemHeight;
    selectedValue = idx + 1;
    highlightSelectedItem(selectedValue);
    updatePreview();

    let scrollTimeout;
    drumEl.onscroll = () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const rawIdx = Math.round(drumEl.scrollTop / itemHeight);
        const clamped = Math.min(Math.max(rawIdx, 0), max - 1);
        drumEl.scrollTo({ top: clamped * itemHeight, behavior: "smooth" });
        selectedValue = clamped + 1;
        highlightSelectedItem(selectedValue);
        updatePreview();
      }, 120);
    };
  }

  function setActiveSegment(unit){
    segmentedEl.querySelectorAll("button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.unit === unit);
    });
  }

  segmentedEl.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      selectedUnit = btn.dataset.unit;
      setActiveSegment(selectedUnit);
      buildDrum(selectedUnit, selectedValue);
    };
  });

  setActiveSegment(selectedUnit);
  buildDrum(selectedUnit, selectedValue);

  document.getElementById("cancelDurationBtn").onclick = () => overlay.remove();
  document.getElementById("confirmDurationBtn").onclick = async () => {
    const btn = document.getElementById("confirmDurationBtn");
    const pgUnit = SEGMENT_TO_PGUNIT[selectedUnit];
    btn.textContent = "Salvataggio…";
    try{
      await sbSetSetting("default_duration_value", selectedValue);
      await sbSetSetting("default_duration_unit", pgUnit);
      currentDefaultValue = selectedValue;
      currentDefaultUnit = pgUnit;
      document.getElementById("currentDurationDisplay").textContent = formatDurationDisplay(selectedValue, pgUnit);
      overlay.remove();

      const hasActive = await sbHasActiveCoins();
      if(hasActive){
        showApplyScopeModal(async (applyToActive) => {
          if(applyToActive){
            try{
              await sbApplyDurationToActiveCoins(selectedValue, pgUnit);
            }catch(e){
              alert("Errore durante l'aggiornamento delle monete già attive.");
            }
          }
          loadCoinList();
        });
      }else{
        loadCoinList();
      }
    }catch(e){
      btn.textContent = "Salva durata";
      alert("Errore durante il salvataggio.");
    }
  };
}

// Calcola i numeri della dashboard a partire dall'elenco completo delle coin.
function computeStats(coins){
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  let active = 0, neverUsed = 0, expired = 0, thisWeek = 0, thisMonth = 0;

  coins.forEach(c => {
    const expiry = effectiveExpiry(c);
    if(!c.first_scan_at){
      neverUsed++;
    }else if(expiry && now >= expiry){
      expired++;
    }else{
      active++;
    }
    if(c.first_scan_at){
      const activatedAt = new Date(c.first_scan_at);
      if(activatedAt >= weekAgo) thisWeek++;
      if(activatedAt >= monthStart) thisMonth++;
    }
  });

  return { total: coins.length, active, neverUsed, expired, thisWeek, thisMonth };
}

      ${backButtonHtml()}
      <div class="admin-header">
        <h1 style="font-family:'SpaceAge', -apple-system, sans-serif; font-weight:400; letter-spacing:1px">Statistiche</h1>
      </div>
      <div class="error-text">Errore nel caricamento delle statistiche.</div>
    `;
    attachBackButton(renderAdmin);
    return;
  }

  const s = computeStats(coins);

  app.innerHTML = `
    ${backButtonHtml()}
    <div class="admin-header">
      <h1 style="font-family:'SpaceAge', -apple-system, sans-serif; font-weight:400; letter-spacing:1px">Statistiche</h1>
    </div>
    <div class="stats-grid">
      <div class="stat-tile"><div class="stat-number" style="color:var(--green)">${s.active}</div><div class="stat-label">Attive ora</div></div>
      <div class="stat-tile"><div class="stat-number">${s.thisMonth}</div><div class="stat-label">Attivate<br>questo mese</div></div>
      <div class="stat-tile"><div class="stat-number">${s.thisWeek}</div><div class="stat-label">Attivate<br>questa settimana</div></div>
    </div>
  `;
  attachBackButton(renderAdmin);
}

let allCoinsCache = [];

async function loadCoinList(){
  const listEl = document.getElementById("coinList");
  listEl.innerHTML = `<div class="loading coin-list-empty">Caricamento…</div>`;

  try{
    allCoinsCache = await sbSelectAllCoins();
  }catch(e){
    listEl.innerHTML = `<div class="error-text coin-list-empty">Errore nel caricamento delle VirtualCoin.</div>`;
    return;
  }

  renderFilteredCoinList();
}

// Applica ricerca testuale + filtro di stato alla cache locale delle coin,
// senza richiedere una nuova chiamata a Supabase ogni volta.
function renderFilteredCoinList(){
  const listEl = document.getElementById("coinList");
  if(!listEl) return;

  if(!allCoinsCache.length){
    listEl.innerHTML = `<div class="loading coin-list-empty">Nessuna VirtualCoin registrata.</div>`;
    return;
  }

  const searchInput = document.getElementById("coinSearchInput");
  const query = (searchInput ? searchInput.value.trim().toUpperCase() : "");
  const activeFilterBtn = document.querySelector("#coinFilterSegmented button.active");
  const filter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";

  const now = new Date();
  let coins = allCoinsCache.filter(c => {
    if(query){
      const displayCode = (c.session_code || fakeDisplayCode(c.id)).toUpperCase();
      const label = (c.label || "").toUpperCase();
      if(!displayCode.includes(query) && !label.includes(query)) return false;
    }
    const expiry = effectiveExpiry(c);
    if(filter === "never" && c.first_scan_at) return false;
    if(filter === "active" && (!c.first_scan_at || (expiry && now >= expiry))) return false;
    if(filter === "expired" && !(c.first_scan_at && expiry && now >= expiry)) return false;
    return true;
  });

  if(!coins.length){
    listEl.innerHTML = `<div class="loading coin-list-empty">Nessuna VirtualCoin corrisponde alla ricerca.</div>`;
    return;
  }

  listEl.innerHTML = coins.map(c => coinRowHtml(c.id, c)).join("");

  coins.forEach(c => {
    const row = document.getElementById(`row-${cssId(c.id)}`);
    row.querySelector(".btn-link").onclick = () => showCoinLinkPopup(c.id);
    const manualBtn = row.querySelector(".btn-manual-activate");
    if(manualBtn) manualBtn.onclick = () => handleManualActivate(c);
    row.querySelector(".btn-unlock-device").onclick = () => handleUnlockDevice(c);
    row.querySelector(".btn-reset").onclick = () => handleReset(c);
  });
}

function cssId(id){ return id.replace(/[^a-zA-Z0-9_-]/g, "_"); }

function statusBadge(coin){
  const expiry = effectiveExpiry(coin);
  if(!coin.first_scan_at) return `<span class="badge badge-gray">Mai usata</span>`;
  if(expiry && new Date() >= expiry) return `<span class="badge badge-red">Scaduta</span>`;
  if(!coin.device_id) return `<span class="badge badge-amber">Attiva · in attesa</span>`;
  return `<span class="badge badge-green">Attiva</span>`;
}

function fmtDate(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleString("it-IT", { dateStyle:"short", timeStyle:"short" });
}

function derivedDurationLabel(coin){
  if(!coin.first_scan_at){
    return `${formatDurationDisplay(currentDefaultValue, currentDefaultUnit)} (non ancora attivata)`;
  }
  if(coin.duration_value && coin.duration_unit){
    return formatDurationDisplay(coin.duration_value, coin.duration_unit);
  }
  return "—";
}

function generateSessionCode(){
  let code = "";
  for(let i = 0; i < 6; i++){
    code += CODE_CHARSET[Math.floor(Math.random() * CODE_CHARSET.length)];
  }
  return code;
}

// Genera un session_code garantito univoco, riprovando fino a 5 volte in
// caso di collisione (evita che due clienti diversi vedano lo stesso codice).
async function generateUniqueSessionCode(){
  let sessionCode;
  let attempts = 0;
  while(attempts < 5){
    sessionCode = generateSessionCode();
    const codeTaken = await sbSessionCodeExists(sessionCode);
    if(!codeTaken) break;
    attempts++;
  }
  return sessionCode;
}

function fakeDisplayCode(id){
  // Codice puramente estetico, stabile ma non riconducibile all'ID reale.
  // Serve solo a non mostrare mai l'ID vero nelle schede prima dell'attivazione.
  let hash = 0;
  for(let i = 0; i < id.length; i++){
    hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  }
  let code = "";
  for(let i = 0; i < 6; i++){
    code += CODE_CHARSET[hash % CODE_CHARSET.length];
    hash = Math.floor(hash / CODE_CHARSET.length) + i * 97;
  }
  return code;
}

function coinRowHtml(id, coin){
  const expiry = effectiveExpiry(coin);
  return `
  <div class="coin-row" id="row-${cssId(id)}">
    <div class="coin-row-top">
      <div>
        <div class="coin-row-id">${coin.session_code || fakeDisplayCode(id)}</div>
        ${coin.label ? `<div class="coin-row-label">${coin.label}</div>` : ""}
      </div>
      ${statusBadge(coin)}
    </div>
    <div class="coin-row-meta">
      Attivata il: ${fmtDate(coin.first_scan_at)}<br>
      Scade il: ${expiry ? fmtDate(expiry.toISOString()) : "—"} · Durata: ${derivedDurationLabel(coin)}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-small btn-link">Vedi link</button>
      ${!coin.first_scan_at ? `<button class="btn btn-secondary btn-small btn-manual-activate">Attiva senza NFC</button>` : ""}
      <button class="btn btn-secondary btn-small btn-unlock-device">Sblocca dispositivo</button>
      <button class="btn btn-secondary btn-small btn-reset">Azzera</button>
    </div>
  </div>`;
}

async function handleCreateCoin(){
  const btn = document.getElementById("createCoinBtn");
  btn.textContent = "Generazione in corso…";
  btn.disabled = true;

  try{
    let code;
    let attempts = 0;
    while(attempts < 5){
      code = generateCoinId();
      const existing = await sbSelectCoin(code);
      if(!existing) break;
      attempts++;
    }

    let sessionCode = await generateUniqueSessionCode();

    await sbInsertCoin(code, { session_code: sessionCode });
    showGeneratedLinkPopup(code);
    loadCoinList();
  }catch(e){
    alert("Errore durante la generazione della VirtualCoin. Riprova.");
  }finally{
    btn.textContent = "Genera nuova VirtualCoin";
    btn.disabled = false;
  }
}

function showCoinLinkPopup(code){
  const url = buildCoinUrl(code);
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">Link VirtualCoin</p>
      <p style="margin-bottom:14px">Copia e scrivi questo link sul tag NFC:</p>
      <p style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;background:rgba(255,255,255,0.08);padding:12px 14px;border-radius:14px;word-break:break-all;color:var(--text);text-align:left;border:1px solid var(--glass-border)">${url}</p>
      <button class="btn btn-primary" id="copyExistingLinkBtn" style="margin-top:16px">Copia link</button>
      <button class="btn btn-secondary" id="closeExistingLinkPopup" style="margin-top:10px">Chiudi</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("copyExistingLinkBtn").onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("copyExistingLinkBtn").textContent = "Copiato!";
    });
  };
  document.getElementById("closeExistingLinkPopup").onclick = () => overlay.remove();
}

function showGeneratedLinkPopup(code){
  const url = buildCoinUrl(code);
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-circle" style="width:72px;height:72px;margin-bottom:14px;background:rgba(52,199,89,0.15);color:var(--green)">
        ${icons.check}
      </div>
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">VirtualCoin creata</p>
      <p style="margin-bottom:14px">Scrivi questo link sul tag NFC:</p>
      <p style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;background:rgba(255,255,255,0.08);padding:12px 14px;border-radius:14px;word-break:break-all;color:var(--text);text-align:left;border:1px solid var(--glass-border)">${url}</p>
      <button class="btn btn-primary" id="copyLinkBtn" style="margin-top:16px">Copia link</button>
      <button class="btn btn-secondary" id="closeLinkPopup" style="margin-top:10px">Chiudi</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("copyLinkBtn").onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("copyLinkBtn").textContent = "Copiato!";
    });
  };
  document.getElementById("closeLinkPopup").onclick = () => overlay.remove();
}

function handleReset(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  const doReset = async () => {
    const newSessionCode = await generateUniqueSessionCode();
    await sbUpdateCoin(coin.id, { first_scan_at: null, expires_at: null, duration_value: null, duration_unit: null, session_code: newSessionCode, device_id: null });
    loadCoinList();
  };
  confirmAction(`Azzerare "${currentCode}"? Verrà generato un nuovo codice e tornerà riutilizzabile da zero.`, doReset);
}

function handleManualActivate(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  confirmAction(`Attivare "${currentCode}" senza NFC? Utile per un cliente il cui telefono non legge gli NFC. La moneta risulterà subito attiva, ma non verrà agganciata a nessun dispositivo: sarà il primo telefono che apre il link a diventarne il proprietario, esattamente come per una prima attivazione normale.`, async () => {
    const updated = await sbUpdateCoin(coin.id, { first_scan_at: new Date().toISOString() });
    loadCoinList();
    showManualActivationPopup(updated || coin);
  });
}

// Popup mostrato SOLO dopo "Attiva senza NFC": QR code da far inquadrare al
// cliente (apre direttamente la scheda della sua VirtualCoin) più un link
// copiabile in alternativa. Il codice mostrato è quello estetico/fake, il
// link e il QR incorporano invece l'ID reale della coin.
function showManualActivationPopup(coin){
  const displayCode = coin.session_code || fakeDisplayCode(coin.id);
  const url = buildCoinUrl(coin.id);
  const qrSvg = generateQrSvg(url);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-circle" style="width:64px;height:64px;margin-bottom:12px;background:rgba(52,199,89,0.15);color:var(--green)">
        ${icons.check}
      </div>
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 4px">VirtualCoin attivata</p>
      <p style="margin-bottom:14px">Codice: <strong>${displayCode}</strong></p>
      <div class="qr-wrap">${qrSvg}</div>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Fai inquadrare questo QR code al cliente per aprire subito la sua VirtualCoin, oppure copia il link qui sotto.</p>
      <button class="btn btn-primary" id="copyManualActivationLinkBtn">Copia link</button>
      <button class="btn btn-secondary" id="closeManualActivationPopup" style="margin-top:10px">Chiudi</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("copyManualActivationLinkBtn").onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("copyManualActivationLinkBtn").textContent = "Copiato!";
    });
  };
  document.getElementById("closeManualActivationPopup").onclick = () => overlay.remove();
}

function handleUnlockDevice(coin){
  const currentCode = coin.session_code || fakeDisplayCode(coin.id);
  confirmAction(`Sbloccare il dispositivo collegato a "${currentCode}"? Il prossimo telefono che apre il link diventerà il nuovo proprietario della VirtualCoin (utile se il cliente ha cambiato telefono).`, async () => {
    await sbUpdateCoin(coin.id, { device_id: null });
    loadCoinList();
  });
}

function confirmAction(message, onConfirm){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p>${message}</p>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-secondary btn-small" id="modalCancel">Annulla</button>
        <button class="btn btn-danger btn-small" id="modalConfirm">Conferma</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("modalCancel").onclick = () => overlay.remove();
  document.getElementById("modalConfirm").onclick = () => {
    overlay.remove();
    onConfirm();
  };
}

// Variante rinforzata: richiede di scrivere esattamente il codice della coin
// per abilitare il pulsante di conferma. Usata solo per azioni distruttive
// su monete GIA' USATE da un cliente reale (dati che andrebbero persi per sempre).
function confirmActionTyped(message, expectedCode, onConfirm){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p>${message}</p>
      <p style="font-size:13px;color:var(--text-secondary);margin:-10px 0 10px">Scrivi <strong>${expectedCode}</strong> per confermare:</p>
      <input type="text" id="confirmTypedInput" autocomplete="off" autocapitalize="characters" style="text-align:center;letter-spacing:2px;font-weight:700;margin-bottom:14px">
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-secondary btn-small" id="modalCancel">Annulla</button>
        <button class="btn btn-danger btn-small" id="modalConfirm" disabled style="opacity:.4">Conferma</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById("confirmTypedInput");
  const confirmBtn = document.getElementById("modalConfirm");
  input.oninput = () => {
    const match = input.value.trim().toUpperCase() === expectedCode.toUpperCase();
    confirmBtn.disabled = !match;
    confirmBtn.style.opacity = match ? "1" : ".4";
  };
  document.getElementById("modalCancel").onclick = () => overlay.remove();
  confirmBtn.onclick = () => {
    if(confirmBtn.disabled) return;
    overlay.remove();
    onConfirm();
  };
}

(function init(){
  const params = new URLSearchParams(window.location.search);
  if(params.has("admin")){
    renderAdmin();
  }else if(params.has("c")){
    const coinId = params.get("c");
    sessionStorage.setItem("vc_active_coin", coinId);
    renderCoinView(coinId);
  }else{
    const rememberedCoin = sessionStorage.getItem("vc_active_coin");
    if(rememberedCoin){
      renderCoinView(rememberedCoin);
    }else{
      renderAdmin();
    }
  }
})();
