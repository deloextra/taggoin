<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NFC Coins</title>
<style>
  :root{
    --blue:#007AFF;
    --green:#34C759;
    --red:#FF3B30;
    --orange:#FF9500;
    --gray:#8E8E93;
    --text:#1C1C1E;
    --text-secondary:rgba(60,60,67,0.6);
    --separator:rgba(60,60,67,0.15);
    --glass-fill:rgba(255,255,255,0.55);
    --glass-fill-strong:rgba(255,255,255,0.75);
    --glass-border:rgba(255,255,255,0.65);
  }
  @font-face{
    font-family: 'SpaceAge';
    src: url('fonts/SpaceAge.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  .brand-title{
    font-family:'SpaceAge', -apple-system, sans-serif;
    font-size:30px; text-align:center; letter-spacing:2px;
    margin:0 0 20px; font-weight:400;
    background:linear-gradient(135deg, var(--blue), #AF52DE);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",sans-serif;
    color:var(--text); display:flex; justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));
    background:
      radial-gradient(circle at 15% 10%, rgba(0,122,255,0.35), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(175,82,222,0.30), transparent 45%),
      radial-gradient(circle at 20% 90%, rgba(52,199,89,0.22), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(255,149,0,0.20), transparent 45%),
      linear-gradient(180deg, #eef1f7, #e4e8f0);
    background-attachment:fixed;
    position:relative;
  }
  .wrap{width:100%; max-width:480px; position:relative;}

  .card{
    background:var(--glass-fill);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:30px; padding:30px 26px;
    box-shadow:0 8px 32px rgba(31,38,135,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    margin-bottom:16px;
  }
  input[type=text], input[type=password], input[type=number], input[type=datetime-local]{
    width:100%; padding:16px 18px; border-radius:16px; border:1px solid var(--separator);
    background:rgba(255,255,255,0.6); backdrop-filter:blur(8px);
    font-size:17px; color:var(--text); outline:none;
    font-family:inherit; margin-bottom:12px;
  }
  input:focus{border-color:var(--blue); background:rgba(255,255,255,0.85);}
  label.field-label{
    font-size:14px; color:var(--text-secondary); font-weight:600;
    margin:0 0 6px 4px; display:block;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:none; border-radius:100px; padding:15px 24px; font-size:16.5px;
    font-weight:600; cursor:pointer; width:100%; font-family:inherit;
    min-height:48px;
    transition:transform .12s, opacity .12s;
    backdrop-filter:blur(12px) saturate(160%);
    -webkit-backdrop-filter:blur(12px) saturate(160%);
  }
  .btn:active{transform:scale(0.97); opacity:.85;}
  .btn-compact{width:auto; padding:14px 30px;}
  .btn-primary{
    background:linear-gradient(180deg, rgba(10,132,255,0.95), rgba(0,110,230,0.95));
    color:#fff; box-shadow:0 4px 14px rgba(0,122,255,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-secondary{
    background:rgba(255,255,255,0.55); color:var(--blue);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .btn-danger{
    background:rgba(255,59,48,0.15); color:var(--red);
    border:1px solid rgba(255,59,48,0.25);
  }
  .btn-small{width:auto; padding:12px 18px; font-size:14px; border-radius:100px; min-height:44px;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
  .btn-row .btn-small{flex:1; min-width:110px;}

  .back-btn{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--glass-border);
    background:var(--glass-fill-strong); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    margin-bottom:18px; box-shadow:0 4px 14px rgba(31,38,135,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
    color:var(--blue); transition:transform .12s;
  }
  .back-btn:active{transform:scale(0.9);}
  .back-btn svg{width:20px; height:20px;}

  .coin-status{text-align:center; padding:28px 0;}
  .icon-circle{
    width:116px; height:116px; border-radius:50%; margin:0 auto 24px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.10);
  }
  .icon-circle svg{width:52px; height:52px;}
  .status-title{font-size:28px; font-weight:700; margin:0 0 8px; letter-spacing:-0.4px;}
  .status-sub{font-size:15px; color:var(--text-secondary); margin:0 0 22px;}
  .date-block{
    background:rgba(255,255,255,0.45); border:1px solid var(--glass-border);
    border-radius:18px; padding:14px 18px; margin:18px 0 14px; text-align:left;
  }
  .date-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 0; font-size:13.5px;}
  .date-row + .date-row{border-top:1px solid var(--separator);}
  .date-row span{color:var(--text-secondary);}
  .date-row strong{font-weight:600; text-align:right; font-size:13.5px;}
  .note-text{
    font-size:12px; color:var(--text-secondary); margin:0 0 4px; line-height:1.5;
  }
  .section-divider{
    height:1px; background:var(--separator); margin:22px 0 20px; border:none;
  }
  .coin-id{
    font-size:13px; color:var(--text-secondary); margin-top:18px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    background:rgba(255,255,255,0.5); display:inline-block; padding:8px 16px; border-radius:100px;
    border:1px solid var(--glass-border);
  }

  /* ---------- coriandoli ---------- */
  .confetti-piece{
    position:fixed; top:-16px; border-radius:2px; pointer-events:none;
    animation:confetti-fall linear forwards;
  }
  @keyframes confetti-fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(115vh) rotate(720deg); opacity:0.85; }
  }

  .badge{display:inline-block; padding:6px 13px; border-radius:100px; font-size:13px; font-weight:600;}
  .badge-green{background:rgba(52,199,89,0.15); color:var(--green);}
  .badge-red{background:rgba(255,59,48,0.15); color:var(--red);}
  .badge-gray{background:rgba(142,142,147,0.15); color:var(--gray);}

  h1{font-size:26px; margin:0 0 4px; letter-spacing:-0.4px;}
  .admin-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .coin-row{
    background:var(--glass-fill); backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:22px; padding:18px; margin-bottom:12px;
    box-shadow:0 4px 16px rgba(31,38,135,0.08);
  }
  .coin-row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .coin-row-id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:15px; font-weight:600;}
  .coin-row-label{font-size:14px; color:var(--text-secondary); margin-top:2px;}
  .coin-row-meta{font-size:13px; color:var(--text-secondary); margin-top:10px; line-height:1.7;}
  .hidden{display:none !important;}
  .loading{text-align:center; color:var(--text-secondary); padding:40px 0; font-size:14px;}
  .error-text{color:var(--red); font-size:13px; margin-top:6px;}
  .inline-panel{margin-top:12px; padding-top:12px; border-top:1px solid var(--separator);}
  .top-actions{display:flex; gap:8px; margin-bottom:16px;}
  .top-actions .btn{width:auto; flex:1;}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.25); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-box{
    background:var(--glass-fill-strong); backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:24px; padding:22px; width:100%; max-width:340px; text-align:center;
    box-shadow:0 12px 40px rgba(31,38,135,0.20);
  }
  .modal-box p{font-size:15px; color:var(--text-secondary); margin:8px 0 20px;}
  .notice{
    background:rgba(255,149,0,0.12); color:#B25E00; font-size:12px; padding:10px 14px;
    border-radius:14px; margin-bottom:16px; text-align:center;
    border:1px solid rgba(255,149,0,0.2);
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Caricamento…</div>
</div>

<script>
const ADMIN_USER = "admin";
const ADMIN_PASS = "admin";
const STORAGE_KEY = "nfc_coins_data";
const app = document.getElementById("app");

function loadAllCoins(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveAllCoins(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function getCoin(id){ return loadAllCoins()[id] || null; }
function upsertCoin(id, fields){
  const all = loadAllCoins();
  all[id] = { ...(all[id] || {}), ...fields };
  saveAllCoins(all);
  return all[id];
}
function deleteCoin(id){
  const all = loadAllCoins();
  delete all[id];
  saveAllCoins(all);
}

function isLoggedIn(){ return sessionStorage.getItem("nfc_admin_logged") === "1"; }
function login(user, pass){
  if(user === ADMIN_USER && pass === ADMIN_PASS){
    sessionStorage.setItem("nfc_admin_logged", "1");
    return true;
  }
  return false;
}
function logout(){
  sessionStorage.removeItem("nfc_admin_logged");
  goHome();
}

function goHome(){ window.location.search = ""; }
function goAdmin(){ window.location.search = "?admin=1"; }

function backButtonHtml(){
  return `<div class="back-btn" id="backBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </div>`;
}
function attachBackButton(handler){
  const btn = document.getElementById("backBtn");
  if(btn) btn.onclick = handler;
}

const icons = {
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>`
};

const COIN_PATTERN = /^coin-(\d{3})$/;

function effectiveExpiry(coin){
  if(coin.expires_at) return new Date(coin.expires_at);
  return null;
}
function fmtDateTime(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleString("it-IT", { dateStyle:"long", timeStyle:"medium" });
}

function launchConfetti(){
  const colors = ["#007AFF","#34C759","#FF9500","#FF3B30","#AF52DE","#FFD60A","#5AC8FA"];
  const container = document.createElement("div");
  container.style.position = "fixed";
  container.style.inset = "0";
  container.style.pointerEvents = "none";
  container.style.zIndex = "9999";
  document.body.appendChild(container);

  const count = 90;
  for(let i=0;i<count;i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.zIndex = "9999";
    const size = 6 + Math.random()*7;
    piece.style.left = (Math.random()*100) + "vw";
    piece.style.width = size + "px";
    piece.style.height = (size*1.6) + "px";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2.6 + Math.random()*1.8) + "s";
    piece.style.animationDelay = (Math.random()*0.5) + "s";
    piece.style.opacity = String(0.75 + Math.random()*0.25);
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 5200);
}

function showWelcomePopup(){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.style.zIndex = "250";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-circle" style="width:72px;height:72px;margin-bottom:14px;background:rgba(255,149,0,0.15);color:var(--orange)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px"><path d="M12 2l2.6 6.6L21 10l-5 4.4L17.5 21 12 17.3 6.5 21 8 14.4 3 10l6.4-1.4z"/></svg>
      </div>
      <p style="font-size:19px;font-weight:700;color:var(--text);margin:0 0 8px">Complimenti!</p>
      <p>Hai guadagnato una <strong>VirtualCoin</strong> che ti dà diritto a una partita gratis.</p>
      <button class="btn btn-primary" id="welcomeOk">OK</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("welcomeOk").onclick = () => overlay.remove();
}

function renderCoinView(coinId){
  if(!COIN_PATTERN.test(coinId)){
    app.innerHTML = `<div class="card coin-status">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">VirtualCoin non riconosciuta</p>
      <p class="status-sub">Formato ID non valido.</p>
      <div class="coin-id">${coinId}</div>
    </div>`;
    return;
  }

  let coin = getCoin(coinId);
  let isFirstActivation = false;
  if(!coin){
    const start = new Date();
    const end = new Date(start);
    end.setDate(end.getDate() + 60);
    coin = upsertCoin(coinId, {
      duration_days: 60,
      first_scan_at: start.toISOString(),
      expires_at: end.toISOString()
    });
    isFirstActivation = true;
  }else if(!coin.first_scan_at){
    const start = new Date();
    const end = new Date(start);
    end.setDate(end.getDate() + (coin.duration_days || 60));
    coin = upsertCoin(coinId, {
      first_scan_at: start.toISOString(),
      expires_at: end.toISOString()
    });
    isFirstActivation = true;
  }
  coin.id = coinId;
  drawCoinStatus(coin, isFirstActivation);
}

function drawCoinStatus(coin, isFirstActivation){
  const expiry = effectiveExpiry(coin);
  const now = new Date();

  if(!expiry || now >= expiry){
    app.innerHTML = `<div class="card coin-status">
      <div class="icon-circle" style="background:rgba(255,59,48,0.15);color:var(--red)">${icons.x}</div>
      <p class="status-title">Scaduta</p>
      <p class="status-sub">La validità di questa VirtualCoin è terminata.</p>
      <div class="coin-id">${coin.id}</div>
    </div>`;
    return;
  }

  app.innerHTML = `<div class="card coin-status">
    <div class="icon-circle" style="background:rgba(52,199,89,0.15);color:var(--green)">${icons.check}</div>
    <p class="status-sub" style="margin-bottom:2px">Ecco la tua VirtualCoin</p>
    <p class="status-title">Attiva</p>
    <div class="date-block">
      <div class="date-row"><span>Attivata il</span><strong>${fmtDateTime(coin.first_scan_at)}</strong></div>
      <div class="date-row"><span>Scade il</span><strong>${fmtDateTime(expiry.toISOString())}</strong></div>
    </div>
    <p class="note-text">Dopo la data di scadenza la VirtualCoin non sarà più utilizzabile.</p>
    <div class="coin-id">${coin.id}</div>

    <div class="section-divider"></div>

    <p class="status-sub" style="margin-bottom:16px">Vivi un'esperienza indimenticabile: scopri le nostre avventure e prenota subito il tuo posto.</p>
    <button class="btn btn-primary btn-compact" id="bookAdventureBtn">Prenota la tua avventura</button>
  </div>`;

  document.getElementById("bookAdventureBtn").onclick = () => {
    window.open("https://www.vrgprato.it/", "_blank");
  };

  if(isFirstActivation){
    launchConfetti();
    showWelcomePopup();
  }
}

function renderAdmin(){
  if(!isLoggedIn()){
    app.innerHTML = `
      <p class="brand-title">VIRTUAL COIN</p>
      <div class="notice">Login temporaneo (admin/admin) — verrà sostituito da un accesso reale con Supabase.</div>
      <div class="card">
        <h1>Accesso admin</h1>
        <label class="field-label">Username</label>
        <input type="text" id="loginUser" autocomplete="username">
        <label class="field-label">Password</label>
        <input type="password" id="loginPass" autocomplete="current-password">
        <button class="btn btn-primary" id="loginBtn">Accedi</button>
        <div class="error-text hidden" id="loginError"></div>
      </div>`;
    document.getElementById("loginBtn").onclick = () => {
      const user = document.getElementById("loginUser").value.trim();
      const pass = document.getElementById("loginPass").value;
      const errEl = document.getElementById("loginError");
      if(login(user, pass)){
        renderAdmin();
      }else{
        errEl.textContent = "Credenziali non valide.";
        errEl.classList.remove("hidden");
      }
    };
    return;
  }

  app.innerHTML = `
    <div class="notice">Dati salvati solo su questo browser (localStorage) — versione temporanea in attesa di Supabase.</div>
    <div class="admin-header">
      <h1>VirtualCoin</h1>
      <button class="btn btn-secondary btn-small" id="logoutBtn">Esci</button>
    </div>
    <div id="coinList"></div>
  `;

  document.getElementById("logoutBtn").onclick = logout;

  loadCoinList();
}

function loadCoinList(){
  const listEl = document.getElementById("coinList");
  const all = loadAllCoins();
  const ids = Object.keys(all).sort();

  if(!ids.length){
    listEl.innerHTML = `<div class="loading">Nessuna VirtualCoin registrata.</div>`;
    return;
  }

  listEl.innerHTML = ids.map(id => coinRowHtml(id, all[id])).join("");

  ids.forEach(id => {
    const row = document.getElementById(`row-${cssId(id)}`);
    row.querySelector(".btn-rename").onclick = () => toggleRenamePanel(id);
    row.querySelector(".btn-reset").onclick = () => handleReset(id);
    row.querySelector(".btn-move").onclick = () => toggleMovePanel(id);
    row.querySelector(".btn-expire").onclick = () => handleExpireNow(id);
    row.querySelector(".btn-delete").onclick = () => handleDelete(id);
  });
}

function cssId(id){ return id.replace(/[^a-zA-Z0-9_-]/g, "_"); }

function statusBadge(coin){
  const expiry = effectiveExpiry(coin);
  if(!coin.first_scan_at) return `<span class="badge badge-gray">Mai usata</span>`;
  if(expiry && new Date() < expiry) return `<span class="badge badge-green">Attiva</span>`;
  return `<span class="badge badge-red">Scaduta</span>`;
}

function fmtDate(iso){
  if(!iso) return "—";
  return new Date(iso).toLocaleString("it-IT", { dateStyle:"short", timeStyle:"short" });
}

function derivedDurationLabel(coin){
  if(coin.first_scan_at && coin.expires_at){
    const ms = new Date(coin.expires_at) - new Date(coin.first_scan_at);
    const days = Math.round(ms / (1000*60*60*24));
    return `${days} giorni`;
  }
  return `${coin.duration_days || 60} giorni (non ancora attivata)`;
}

function coinRowHtml(id, coin){
  const expiry = effectiveExpiry(coin);
  return `
  <div class="coin-row" id="row-${cssId(id)}">
    <div class="coin-row-top">
      <div>
        <div class="coin-row-id">${id}</div>
        ${coin.label ? `<div class="coin-row-label">${coin.label}</div>` : ""}
      </div>
      ${statusBadge(coin)}
    </div>
    <div class="coin-row-meta">
      Attivata il: ${fmtDate(coin.first_scan_at)}<br>
      Scade il: ${expiry ? fmtDate(expiry.toISOString()) : "—"} · Durata: ${derivedDurationLabel(coin)}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary btn-small btn-rename">Correggi ID</button>
      <button class="btn btn-secondary btn-small btn-reset">Azzera</button>
      <button class="btn btn-secondary btn-small btn-move">Modifica date</button>
      <button class="btn btn-secondary btn-small btn-expire">Disattiva ora</button>
      <button class="btn btn-danger btn-small btn-delete">Elimina</button>
    </div>
    <div class="inline-panel hidden" id="rename-${cssId(id)}"></div>
    <div class="inline-panel hidden" id="move-${cssId(id)}"></div>
  </div>`;
}

function toggleRenamePanel(id){
  const panel = document.getElementById(`rename-${cssId(id)}`);
  const isHidden = panel.classList.contains("hidden");
  if(!isHidden){ panel.classList.add("hidden"); return; }
  panel.classList.remove("hidden");
  panel.innerHTML = `
    <p class="error-text" style="color:var(--text-secondary);margin-bottom:10px">
      Usa questa opzione se il tag NFC fisico è stato scritto con un ID diverso da questo.
      Tutti i dati (attivazione, scadenza, etichetta) verranno spostati sul nuovo ID.
    </p>
    <label class="field-label">Nuovo ID (deve corrispondere a quello scritto sul tag)</label>
    <input type="text" id="renameInput-${cssId(id)}" placeholder="es. coin-005">
    <button class="btn btn-primary btn-small" id="renameSave-${cssId(id)}">Correggi ID</button>
    <div class="error-text hidden" id="renameError-${cssId(id)}"></div>
  `;
  document.getElementById(`renameSave-${cssId(id)}`).onclick = () => {
    const newId = document.getElementById(`renameInput-${cssId(id)}`).value.trim();
    const errEl = document.getElementById(`renameError-${cssId(id)}`);
    errEl.classList.add("hidden");

    if(!COIN_PATTERN.test(newId)){
      errEl.textContent = 'ID non valido. Usa il formato "coin-005".';
      errEl.classList.remove("hidden");
      return;
    }
    if(newId === id){
      errEl.textContent = "È già l'ID attuale.";
      errEl.classList.remove("hidden");
      return;
    }
    if(getCoin(newId)){
      errEl.textContent = "Esiste già una VirtualCoin con questo ID.";
      errEl.classList.remove("hidden");
      return;
    }
    const data = getCoin(id);
    upsertCoin(newId, data);
    deleteCoin(id);
    loadCoinList();
  };
}

function handleReset(id){
  confirmAction(`Azzerare "${id}"? Tornerà riutilizzabile da zero.`, () => {
    upsertCoin(id, { first_scan_at: null, expires_at: null });
    loadCoinList();
  });
}
function handleExpireNow(id){
  confirmAction(`Disattivare subito "${id}"?`, () => {
    upsertCoin(id, { expires_at: new Date().toISOString() });
    loadCoinList();
  });
}
function handleDelete(id){
  confirmAction(`Eliminare definitivamente "${id}"? Azione irreversibile.`, () => {
    deleteCoin(id);
    loadCoinList();
  });
}

function toDatetimeLocalValue(date){
  if(!date) return "";
  const pad = n => String(n).padStart(2,"0");
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function toggleMovePanel(id){
  const panel = document.getElementById(`move-${cssId(id)}`);
  const isHidden = panel.classList.contains("hidden");
  if(!isHidden){ panel.classList.add("hidden"); return; }
  panel.classList.remove("hidden");

  const coin = getCoin(id);
  const currentStart = coin.first_scan_at ? new Date(coin.first_scan_at) : new Date();
  const currentExpiry = effectiveExpiry(coin) || (() => {
    const d = new Date(currentStart);
    d.setDate(d.getDate() + (coin.duration_days || 60));
    return d;
  })();

  panel.innerHTML = `
    <label class="field-label">Data attivazione</label>
    <input type="datetime-local" id="startInput-${cssId(id)}" value="${toDatetimeLocalValue(currentStart)}">
    <label class="field-label">Data scadenza</label>
    <input type="datetime-local" id="endInput-${cssId(id)}" value="${toDatetimeLocalValue(currentExpiry)}">
    <p class="error-text" style="color:var(--text-secondary);margin-bottom:10px">
      Cambiando la data attivazione, la scadenza si sposta mantenendo la stessa durata.
      Puoi comunque modificare la scadenza a mano per accorciare o allungare la validità.
    </p>
    <button class="btn btn-primary btn-small" id="moveSave-${cssId(id)}">Salva date</button>
  `;

  const startInput = document.getElementById(`startInput-${cssId(id)}`);
  const endInput = document.getElementById(`endInput-${cssId(id)}`);
  const originalDurationMs = currentExpiry - currentStart;

  startInput.addEventListener("change", () => {
    const newStart = new Date(startInput.value);
    if(isNaN(newStart)) return;
    const newEnd = new Date(newStart.getTime() + originalDurationMs);
    endInput.value = toDatetimeLocalValue(newEnd);
  });

  document.getElementById(`moveSave-${cssId(id)}`).onclick = () => {
    const startVal = startInput.value;
    const endVal = endInput.value;
    const fields = {};
    if(startVal) fields.first_scan_at = new Date(startVal).toISOString();
    if(endVal) fields.expires_at = new Date(endVal).toISOString();
    upsertCoin(id, fields);
    loadCoinList();
  };
}

function confirmAction(message, onConfirm){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <p>${message}</p>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-secondary btn-small" id="modalCancel">Annulla</button>
        <button class="btn btn-danger btn-small" id="modalConfirm">Conferma</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("modalCancel").onclick = () => overlay.remove();
  document.getElementById("modalConfirm").onclick = () => {
    overlay.remove();
    onConfirm();
  };
}

(function init(){
  const params = new URLSearchParams(window.location.search);
  if(params.has("admin")){
    renderAdmin();
  }else if(params.has("c")){
    renderCoinView(params.get("c"));
  }else{
    renderAdmin();
  }
})();
</script>
